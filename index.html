<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hava Durumu</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-400 to-indigo-700 min-h-screen flex items-center justify-center">
    <div class="bg-white bg-opacity-30 rounded-3xl p-8 w-full max-w-xl mx-4 text-white shadow-2xl">
        <h1 class="text-3xl font-bold text-center mb-6">🌤️ Hava Durumu</h1>
        <div class="flex gap-2 mb-8">
            <input type="text" id="sehir" placeholder="Şehir Adı Girin"
            onkeydown="if(event.key === 'Enter') havaDurumuGetir()"
                class="flex-1 px-4 py-2 rounded-xl bg-white bg-opacity-20 placeholder-white placeholder-opacity-80 text-white outline-none focus:ring-2 focus:ring-white">
            <button onclick="havaDurumuGetir()"
                class="px-5 py-2 bg-white text-indigo-700 font-semibold rounded-xl hover:bg-opacity-80 transition">
                Ara
            </button>
        </div>

        <div id="sonuc"></div>
    </div>

    <script>
        const API_KEY = "154121d2416e93427819018f38052b07";
        async function havaDurumuGetir() {
            const sehir = document.getElementById("sehir").value;

            if (!sehir) {
                sonucGoster(`<p class="text-center text-red-500">Lütfen bir şehir girin!</p>`);
                return
            }
            sonucGoster(`<p class="text-center animate-pulse">Yükleniyor...</p>`);

            try {
                const response = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?q=${sehir}&appid=${API_KEY}&units=metric&lang=tr`
                );
                if (!response.ok) {
                    throw new Error("Şehir bulunamadı!");
                }

                const data = await response.json();
                kartGoster(data)

            }   catch (error) {
                sonucGoster(`<p class="text-center text-red-200">❌ ${error.message}</p>`);
            }
        }

        function kartGoster(data) {
            const sicaklik = Math.round(data.main.temp);
            const hissedilen = Math.round(data.main.feels_like);
            const nem = data.main.humidity;
            const aciklama = data.weather[0].description;
            const ikon = data.weather[0].icon; 
            const sehirAdi = data.name;
            const ulke = data.sys.country;

            sonucGoster(`
            <div class="text-center">
                <h2 class="text-2xl font-bold">${sehirAdi}, ${ulke}</h2>
                <img src="https://openweathermap.org/img/wn/${ikon}@2x.png" class="mx-auto w-24">
                <p class="text-6xl font-bold my-2">${sicaklik}°C</p>
                <p class="text-lg capitalize mb-4">${aciklama}</p>
                <div class="flex justify-around bg-white bg-opacity-20 rounded-2xl p-4">
                    <div>
                        <p class="text-sm opacity-70">Hissedilen</p>
                        <p class="text-xl font-semibold">${hissedilen}</p>
                    </div>
                    <div>
                        <p class="text-sm opacity-70">Nem</p>
                        <p class="text-xl font-semibold">${nem}</p>
                    </div>    
                </div>
            </div>    
            `);
        }    
        function sonucGoster(html) {
            document.getElementById("sonuc").innerHTML = html;
        }
    </script>

</body>

</html>
